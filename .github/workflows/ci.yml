name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jquery-version: [2.2.4, 3.7.1, 4.0.0]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm i --no-save jquery@${{ matrix.jquery-version }}
      - run: npm test
      - run: npm run build
